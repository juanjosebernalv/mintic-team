<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none">
  <defs>
    <linearGradient id="corn-grad" x1="200" y1="30" x2="200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4904a"/>
      <stop offset="50%" stop-color="#c47a3a"/>
      <stop offset="100%" stop-color="#8b5e28"/>
    </linearGradient>
    <linearGradient id="leaf-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d6b3a"/>
      <stop offset="100%" stop-color="#2a4d28"/>
    </linearGradient>
    <linearGradient id="ai-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0fa89a"/>
    </linearGradient>
    <linearGradient id="rz-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c47a3a"/>
      <stop offset="100%" stop-color="#8b5e28"/>
    </linearGradient>
    <filter id="glow-teal">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-copper">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Rayos solares ── -->
  <g stroke="#c47a3a" stroke-width="1.2" opacity="0.7">
    <line x1="200" y1="38" x2="200" y2="10"/>
    <line x1="200" y1="38" x2="225" y2="12"/>
    <line x1="200" y1="38" x2="246" y2="20"/>
    <line x1="200" y1="38" x2="260" y2="34"/>
    <line x1="200" y1="38" x2="265" y2="52"/>
    <line x1="200" y1="38" x2="175" y2="12"/>
    <line x1="200" y1="38" x2="154" y2="20"/>
    <line x1="200" y1="38" x2="140" y2="34"/>
    <line x1="200" y1="38" x2="135" y2="52"/>
  </g>
  <!-- Rayos teal intercalados -->
  <g stroke="#2dd4bf" stroke-width="0.8" opacity="0.5">
    <line x1="200" y1="38" x2="213" y2="10"/>
    <line x1="200" y1="38" x2="237" y2="15"/>
    <line x1="200" y1="38" x2="255" y2="28"/>
    <line x1="200" y1="38" x2="263" y2="44"/>
    <line x1="200" y1="38" x2="187" y2="10"/>
    <line x1="200" y1="38" x2="163" y2="15"/>
    <line x1="200" y1="38" x2="145" y2="28"/>
    <line x1="200" y1="38" x2="137" y2="44"/>
  </g>

  <!-- ── Hoja izquierda ── -->
  <path d="M200 240 C190 220 150 200 120 170 C110 155 115 140 130 145 C155 150 185 185 200 215 Z"
        fill="url(#leaf-grad)" stroke="#3d6b3a" stroke-width="1"/>
  <path d="M200 240 C185 210 140 195 105 180 C95 175 95 160 110 160 C135 162 175 190 200 225 Z"
        fill="#2a4d28" opacity="0.6"/>

  <!-- Hoja derecha -->
  <path d="M200 240 C210 220 250 200 280 170 C290 155 285 140 270 145 C245 150 215 185 200 215 Z"
        fill="url(#leaf-grad)" stroke="#3d6b3a" stroke-width="1"/>
  <path d="M200 240 C215 210 260 195 295 180 C305 175 305 160 290 160 C265 162 225 190 200 225 Z"
        fill="#2a4d28" opacity="0.6"/>

  <!-- ── Mazorca principal ── -->
  <!-- Cuerpo -->
  <path d="M172 240 C168 210 170 160 175 120 C178 95 185 65 200 42 C215 65 222 95 225 120 C230 160 232 210 228 240 Z"
        fill="url(#corn-grad)" stroke="#8b5e28" stroke-width="1.5"/>

  <!-- Patrón geométrico tipo laberinto sobre la mazorca -->
  <g stroke="#1a0f04" stroke-width="1.5" opacity="0.7">
    <!-- Fila central -->
    <rect x="188" y="130" width="24" height="18" rx="1" fill="none"/>
    <rect x="192" y="134" width="16" height="10" rx="1" fill="none"/>
    <!-- Fila superior -->
    <rect x="186" y="108" width="28" height="18" rx="1" fill="none"/>
    <rect x="191" y="113" width="18" height="8" rx="1" fill="none"/>
    <!-- Espiral central -->
    <path d="M196 138 L196 136 L204 136 L204 142 L198 142 L198 139 L202 139" stroke-linecap="round"/>
    <!-- Fila inferior -->
    <rect x="184" y="152" width="32" height="20" rx="1" fill="none"/>
    <path d="M190 162 L196 162 L196 158 L204 158 L204 164 L190 164"/>
    <!-- Detalle inferior -->
    <rect x="182" y="178" width="36" height="18" rx="1" fill="none"/>
    <path d="M190 186 L192 183 L200 183 L208 183 L210 186"/>
  </g>

  <!-- Punta de la mazorca (redondeada) -->
  <ellipse cx="200" cy="45" rx="10" ry="8" fill="#d4904a" stroke="#8b5e28" stroke-width="1"/>

  <!-- ── Nodos de circuito izquierda ── -->
  <g stroke="#2dd4bf" stroke-width="1" opacity="0.85" filter="url(#glow-teal)">
    <line x1="168" y1="165" x2="140" y2="165"/>
    <line x1="140" y1="165" x2="140" y2="145"/>
    <line x1="140" y1="145" x2="120" y2="145"/>
    <circle cx="140" cy="165" r="3" fill="#2dd4bf"/>
    <circle cx="120" cy="145" r="2.5" fill="none" stroke="#2dd4bf" stroke-width="1.5"/>
    <line x1="168" y1="195" x2="128" y2="195"/>
    <line x1="128" y1="195" x2="128" y2="215"/>
    <circle cx="128" cy="195" r="3" fill="#2dd4bf"/>
    <circle cx="128" cy="215" r="2" fill="#2dd4bf" opacity="0.7"/>
  </g>

  <!-- Nodos circuito derecha -->
  <g stroke="#2dd4bf" stroke-width="1" opacity="0.85" filter="url(#glow-teal)">
    <line x1="232" y1="165" x2="260" y2="165"/>
    <line x1="260" y1="165" x2="260" y2="145"/>
    <line x1="260" y1="145" x2="280" y2="145"/>
    <circle cx="260" cy="165" r="3" fill="#2dd4bf"/>
    <circle cx="280" cy="145" r="2.5" fill="none" stroke="#2dd4bf" stroke-width="1.5"/>
    <line x1="232" y1="195" x2="272" y2="195"/>
    <line x1="272" y1="195" x2="272" y2="215"/>
    <circle cx="272" cy="195" r="3" fill="#2dd4bf"/>
    <circle cx="272" cy="215" r="2" fill="#2dd4bf" opacity="0.7"/>
  </g>

  <!-- ── Cenefa inferior geométrica ── -->
  <g fill="none" stroke="#c47a3a" stroke-width="1.5" opacity="0.8">
    <!-- Izquierda -->
    <path d="M60 270 L80 270 L80 255 L95 255 L95 265 L110 265 L110 255 L125 255 L125 270 L155 270"/>
    <!-- Derecha -->
    <path d="M245 270 L275 270 L275 255 L290 255 L290 265 L305 265 L305 255 L320 255 L320 270 L340 270"/>
  </g>
  <!-- Puntos en las esquinas de la cenefa -->
  <g fill="#2dd4bf" opacity="0.9">
    <circle cx="80" cy="255" r="2.5"/>
    <circle cx="110" cy="255" r="2.5"/>
    <circle cx="290" cy="255" r="2.5"/>
    <circle cx="320" cy="255" r="2.5"/>
  </g>

  <!-- ── Wordmark rAIz ── -->
  <text x="200" y="330" text-anchor="middle"
        font-family="'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="72" font-weight="900" letter-spacing="-2">
    <tspan fill="url(#rz-grad)">r</tspan><tspan fill="url(#ai-grad)" font-style="italic">AI</tspan><tspan fill="url(#rz-grad)">z</tspan>
  </text>

  <!-- ── Subtítulo ── -->
  <text x="200" y="360" text-anchor="middle"
        font-family="'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="11" font-weight="500" letter-spacing="3.5"
        fill="#667060">
    AGRICULTURA INTELIGENTE COLOMBIANA
  </text>
</svg>
